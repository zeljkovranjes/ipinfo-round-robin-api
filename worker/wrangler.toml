name = "worker-ipinfo-round-robin"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

# Set your API keys as a secret (never put real keys in vars):
#   wrangler secret put IPINFO_KEYS
#   Value format: "key1,key2,key3"

[vars]
CACHE_TTL_SECONDS    = "300"
COOLDOWN_SECONDS     = "60"
CACHE_MAX_BODY_BYTES = "32768"
IPINFO_BASE_URL      = "https://ipinfo.io"
REDACT_KEYS          = "false"

# Analytics Engine — requires Workers paid plan (optional).
# Uncomment to track per-request metrics (cache hit rate, status codes, key cooldowns, etc.)
# Query your data at https://dash.cloudflare.com/ → Workers → Analytics Engine
#
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset  = "ipinfo-round-robin_requests"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1